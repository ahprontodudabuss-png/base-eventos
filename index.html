<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDV - Missão Guarulhos | Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: auto;
            margin: 0 auto 1.5rem auto;
        }
        .btn-primary {
            background-color: #ca8a04; /* Cor dourada combinando com o logo */
            color: white;
            padding: 0.75rem;
            border-radius: 0.375rem;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #a16207;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="assets/img/logo.png" alt="IDV Logo" class="logo">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">IDV - Missão Guarulhos</h1>
    
    <form id="loginForm">
        <div class="mb-4 text-left">
            <label for="email" class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
            <input type="email" id="email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
        </div>
        <div class="mb-6 text-left">
            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
            <input type="password" id="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" required>
        </div>
        <button type="submit" class="btn-primary">Entrar no Sistema</button>
    </form>
    
    <p class="mt-4 text-sm text-gray-500">Integrador de Dados de Eventos</p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // Simulação de login - na versão real conectaria com Apps Script ou Firebase
        const email = document.getElementById('email').value;
        if(email) {
            localStorage.setItem('idv_user', email);
            window.location.href = 'dashboard.html';
        }
    });
    
    // Se já estiver logado, redireciona
    if(localStorage.getItem('idv_user')) {
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
