<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDV - Missão Guarulhos | Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: auto;
            margin: 0 auto 1.5rem auto;
        }
        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="logo.png" alt="IDV Logo" class="logo">
    <h1 class="text-2xl font-bold mb-2 text-gray-800">IDV - Missão Guarulhos</h1>
    <p class="text-sm text-gray-500 mb-6">Integrador de Dados de Eventos</p>
    
    <div id="alert-container" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded text-sm">
        <!-- Mensagens de erro aparecerão aqui -->
    </div>

    <!-- Botão do Google Sign-In -->
   <div class="google-btn-container">
    <div id="google-signin"></div>
</div>
</div>

<script>
    // Inicializa o Google Identity Services com o Client ID configurado
    window.onload = function () {
    google.accounts.id.initialize({
        client_id: CONFIG.GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
        document.getElementById("google-signin"),
        {
            type: "standard",
            theme: "outline",
            size: "large",
            text: "signin_with",
            shape: "rectangular",
            logo_alignment: "left"
        }
    );
};

    // Callback quando o login é bem-sucedido
    function handleCredentialResponse(response) {
        // O response.credential é um JWT (JSON Web Token)
        const jwt = response.credential;
        
        // Decodificar o JWT para pegar os dados do usuário (apenas no frontend para display)
        const payload = JSON.parse(atob(jwt.split('.')[1]));
        
        // Salvar os dados da sessão
        localStorage.setItem('idv_user', JSON.stringify({
            name: payload.name,
            email: payload.email,
            picture: payload.picture,
            token: jwt // Guarda o token para enviar para a API (se necessário)
        }));
        
        // Redirecionar para o dashboard
        window.location.href = 'dashboard.html';
    }
    
    // Se já estiver logado, redireciona
    if(localStorage.getItem('idv_user')) {
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
