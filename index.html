<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDV - Missão Guarulhos | Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="assets/js/config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: auto;
            margin: 0 auto 1.5rem auto;
        }
        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }
        .error-message {
            background-color: #fee;
            border-left: 4px solid #f44;
            color: #c33;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div id="loginForm">
        <img src="assets/img/logo.png" alt="IDV Logo" class="logo">
        <h1 class="text-3xl font-bold mb-2 text-gray-800">IDV</h1>
        <p class="text-sm text-gray-500 mb-8">Missão Guarulhos</p>
        
        <div id="alert-container" class="hidden error-message"></div>

        <!-- Botão do Google Sign-In -->
        <div class="google-btn-container">
            <div id="g_id_onload"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
    </div>

    <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p class="text-gray-600">Processando login...</p>
    </div>
</div>

<script>
    // Inicializa o Google Identity Services
    window.onload = function () {
        // Verifica se já está logado
        if(localStorage.getItem('idv_user')) {
            window.location.href = 'dashboard.html';
            return;
        }

        // Inicializa o Google Sign-In
        if (CONFIG.GOOGLE_CLIENT_ID && CONFIG.GOOGLE_CLIENT_ID !== 'COLOQUE_AQUI_O_SEU_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
            document.getElementById('g_id_onload').setAttribute('data-client_id', CONFIG.GOOGLE_CLIENT_ID);
        } else {
            document.getElementById('alert-container').innerHTML = '<strong>Erro:</strong> Google Client ID não configurado. Verifique o arquivo config.js';
            document.getElementById('alert-container').classList.remove('hidden');
        }
    };

    // Callback quando o login é bem-sucedido
    function handleCredentialResponse(response) {
        try {
            // Mostrar loading
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('loadingState').style.display = 'block';

            // O response.credential é um JWT (JSON Web Token)
            const jwt = response.credential;
            
            // Decodificar o JWT para pegar os dados do usuário
            const payload = JSON.parse(atob(jwt.split('.')[1]));
            
            // Salvar os dados da sessão
            localStorage.setItem('idv_user', JSON.stringify({
                name: payload.name,
                email: payload.email,
                picture: payload.picture,
                token: jwt
            }));
            
            // Redirecionar para o dashboard após 1 segundo
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } catch (error) {
            console.error('Erro ao processar login:', error);
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('alert-container').innerHTML = '<strong>Erro:</strong> Falha ao processar o login. Tente novamente.';
            document.getElementById('alert-container').classList.remove('hidden');
        }
    }

    // Tratamento de erro do Google Sign-In
    function handleSignInError(error) {
        console.error('Erro no Google Sign-In:', error);
        document.getElementById('alert-container').innerHTML = '<strong>Erro:</strong> Falha na autenticação do Google. Verifique suas configurações.';
        document.getElementById('alert-container').classList.remove('hidden');
    }
</script>

</body>
</html>
