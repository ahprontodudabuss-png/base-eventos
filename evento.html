<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDV - Detalhes do Evento</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="assets/js/config.js"></script>
    <style>
        .banner-header {
            height: 300px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .banner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }
        .tally-container {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Navbar simples -->
    <nav class="bg-gray-900 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="assets/img/logo.png" alt="Logo" class="w-8 h-auto">
                <span class="font-bold">IDV</span>
            </div>
            <a href="eventos.html" class="text-gray-300 hover:text-white flex items-center">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Voltar aos Eventos
            </a>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="loadingState" class="container mx-auto mt-20 text-center">
        <svg class="animate-spin h-10 w-10 text-yellow-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-xl text-gray-600">Carregando informações do evento...</p>
    </div>

    <!-- Content (Hidden initially) -->
    <div id="eventContent" class="hidden">
        <!-- Header/Banner -->
        <div id="eventBanner" class="banner-header">
            <div class="banner-overlay"></div>
            <div class="container mx-auto h-full relative z-10 flex flex-col justify-end pb-8 px-4">
                <span id="eventComissao" class="bg-yellow-600 text-white text-xs font-bold px-3 py-1 rounded-full w-max mb-3 uppercase tracking-wide">Comissão</span>
                <h1 id="eventNome" class="text-4xl md:text-5xl font-bold text-white mb-2">Nome do Evento</h1>
                <div class="flex items-center text-gray-300 space-x-4">
                    <span class="flex items-center"><svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> <span id="eventData">Data</span></span>
                    <span class="flex items-center"><svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> <span id="eventResp">Responsável</span></span>
                </div>
            </div>
        </div>

        <!-- Main Section -->
        <div class="container mx-auto px-4 py-8 max-w-5xl">
            <div class="bg-white rounded-lg shadow-lg p-6 md:p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-800">Relatório do Evento</h2>
                    <p class="text-gray-600 mt-2">Preencha os dados abaixo. As informações do evento já foram vinculadas automaticamente.</p>
                </div>
                
                <!-- Aqui o Tally será injetado -->
                <div id="tallyWrapper" class="w-full flex justify-center">
                    <!-- Iframe será criado via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        if(!eventId) {
            alert('ID do evento não fornecido!');
            window.location.href = 'eventos.html';
        }

        async function loadEventData() {
            try {
                const res = await fetch(`${CONFIG.API_URL}?action=getEvento&id=${eventId}`);
                const evt = await res.json();
                
                if(evt.error) throw new Error(evt.error);

                // Preencher UI
                document.getElementById('eventNome').textContent = evt.Nome;
                document.getElementById('eventComissao').textContent = evt.Comissão || 'Geral';
                document.getElementById('eventData').textContent = evt.Data ? new Date(evt.Data).toLocaleDateString('pt-BR') : '-';
                document.getElementById('eventResp').textContent = evt.Responsável || '-';
                
                const bannerUrl = evt.Banner || 'https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&q=80&w=1920';
                document.getElementById('eventBanner').style.backgroundImage = `url('${bannerUrl}')`;

                // Montar a URL do Tally com os Hidden Fields
                // Exemplo de hidden fields esperados no Tally: evento_id, evento_nome, comissao
                const tallyUrlObj = new URL(CONFIG.TALLY_URL);
                tallyUrlObj.searchParams.append('evento_id', evt.ID);
                tallyUrlObj.searchParams.append('evento_nome', evt.Nome);
                tallyUrlObj.searchParams.append('comissao', evt.Comissão || 'Geral');
                
                // Criar o iframe do Tally
                const iframe = document.createElement('iframe');
                iframe.src = tallyUrlObj.toString();
                iframe.className = 'tally-container';
                iframe.title = 'Formulário de Relatório';
                
                document.getElementById('tallyWrapper').appendChild(iframe);

                // Mostrar conteúdo
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('eventContent').style.display = 'block';

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="text-red-500 mb-4">
                        <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <p class="text-xl text-gray-800 font-bold">Erro ao carregar o evento</p>
                    <p class="text-gray-600 mt-2">Verifique se o ID está correto ou se a API está configurada.</p>
                    <a href="eventos.html" class="mt-4 inline-block text-yellow-600 font-bold hover:underline">Voltar aos eventos</a>
                `;
            }
        }

        loadEventData();
    </script>
</body>
</html>
