<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDV - Meus Eventos</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="assets/js/config.js"></script>
    <style>
        .sidebar { background-color: #1f2937; color: white; min-height: 100vh; }
        .nav-item { padding: 1rem; display: block; color: #d1d5db; text-decoration: none; transition: background 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: #374151; color: white; border-left: 4px solid #ca8a04; }
        .logo-small { width: 40px; height: auto; }
        .event-card { transition: transform 0.2s; }
        .event-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-100 flex">

    <!-- Sidebar -->
    <aside class="sidebar w-64 flex-shrink-0">
        <div class="p-4 flex items-center space-x-3 border-b border-gray-700">
            <img src="assets/img/logo.png" alt="Logo" class="logo-small">
            <span class="font-bold text-xl">IDV</span>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="eventos.html" class="nav-item active">Meus Eventos</a>
            <a href="#" class="nav-item" onclick="logout()">Sair</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Meus Eventos</h1>
            <p class="text-gray-600 mt-2">Selecione um evento para preencher o relatório.</p>
        </header>

        <div id="eventosGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10 text-gray-500" id="loadingMsg">
                <svg class="animate-spin h-8 w-8 text-yellow-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Carregando eventos...
            </div>
        </div>
    </main>

    <script>
        const user = localStorage.getItem('idv_user');
        if(!user) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('idv_user');
            window.location.href = 'index.html';
        }

        async function loadEventos() {
            if(CONFIG.API_URL === 'COLOQUE_AQUI_A_URL_DO_SEU_APPS_SCRIPT') {
                document.getElementById('eventosGrid').innerHTML = `
                    <div class="col-span-full bg-red-100 border-l-4 border-red-500 text-red-700 p-4">
                        <p class="font-bold">Atenção</p>
                        <p>Configure a API_URL no arquivo assets/js/config.js</p>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(`${CONFIG.API_URL}?action=getEventos`);
                const eventos = await res.json();
                
                const grid = document.getElementById('eventosGrid');
                grid.innerHTML = '';
                
                if(eventos.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500">Nenhum evento encontrado.</div>';
                    return;
                }

                eventos.forEach(evt => {
                    // Fallback para imagem caso não tenha banner na planilha
                    const bannerUrl = evt.Banner || 'https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&q=80&w=1000';
                    const dataFormatada = evt.Data ? new Date(evt.Data).toLocaleDateString('pt-BR') : 'Data não definida';
                    
                    grid.innerHTML += `
                        <div class="bg-white rounded-lg shadow-md overflow-hidden event-card flex flex-col">
                            <div class="h-48 bg-gray-300 bg-cover bg-center" style="background-image: url('${bannerUrl}')"></div>
                            <div class="p-6 flex-1 flex flex-col">
                                <div class="flex justify-between items-start mb-2">
                                    <h2 class="text-xl font-bold text-gray-800">${evt.Nome}</h2>
                                    <span class="bg-gray-100 text-gray-800 text-xs px-2 py-1 rounded border">${evt.Comissão || 'Geral'}</span>
                                </div>
                                <p class="text-gray-500 text-sm mb-4 flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${dataFormatada}
                                </p>
                                <div class="mt-auto pt-4 border-t border-gray-100">
                                    <a href="evento.html?id=${evt.ID}" class="block w-full text-center bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                                        Acessar Evento
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('eventosGrid').innerHTML = `
                    <div class="col-span-full bg-red-100 border-l-4 border-red-500 text-red-700 p-4">
                        Erro ao carregar eventos. Verifique o console.
                    </div>`;
            }
        }

        loadEventos();
    </script>
</body>
</html>
